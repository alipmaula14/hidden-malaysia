<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | Hidden Malaysia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">HIDDEN MALAYSIA</div>
      <div class="text-center mt-4">
        <span class="kicker">Admin panel</span>
        <h2 class="serif mt-2" style="font-size:1.8rem;">Welcome back</h2>
        <p class="text-muted" style="font-size:0.92rem; margin-top:4px;">Sign in to manage stories and messages.</p>
      </div>

      <form id="loginForm" class="mt-6" novalidate>
        <div class="form-group">
          <label class="label" for="username">Username</label>
          <div class="input-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
            <input class="input" id="username" type="text" autocomplete="username" required />
          </div>
        </div>
        <div class="form-group">
          <label class="label" for="password">Password</label>
          <div class="input-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
            <input class="input" id="password" type="password" autocomplete="current-password" required />
            <button type="button" class="toggle-pw" id="togglePw" aria-label="Show password">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div class="field-error" id="loginError" style="display:none; margin-bottom:12px;"></div>
        <button type="submit" class="btn btn-primary" id="loginBtn" style="width:100%; justify-content:center;">Sign in</button>
      </form>

      <p class="text-center text-muted mt-6" style="font-size:0.8rem;">Hidden Malaysia · BIT21503 · UTHM</p>
    </div>
  </div>

  <script src="/js/helpers.js"></script>
  <script src="/js/admin-login.js"></script>
</body>
</html>
